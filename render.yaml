services:
  - type: web
    name: sarthi-ai-backend
    env: python
    plan: free
    region: oregon
    buildCommand: "cd backend && pip install -r requirements.txt"
    startCommand: "cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: ENV
        value: production
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENAQ_API_KEY
        sync: false
